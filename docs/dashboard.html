<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — FGD Skin Survey</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#202124;padding:24px}
h1{font-size:24px;font-weight:500;margin-bottom:4px}
.sub{color:#5f6368;font-size:14px;margin-bottom:24px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden}
.card h2{font-size:16px;font-weight:500;padding:16px 20px;border-bottom:1px solid #e0e0e0}
.card table{width:100%;border-collapse:collapse}
.card th,.card td{padding:10px 14px;text-align:left;font-size:14px;border-bottom:1px solid #f0f0f0}
.card th{font-weight:500;color:#5f6368;font-size:12px;text-transform:uppercase}
.full{grid-column:1/-1}
.stars{color:#f9ab00;font-size:16px;letter-spacing:2px}
.loading{text-align:center;padding:60px;font-size:18px;color:#5f6368}
.error{text-align:center;padding:60px;color:#d93025}
.login-box{background:#fff;padding:40px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);text-align:center;max-width:360px;margin:80px auto}
.login-box input{width:100%;padding:12px 16px;font-size:16px;border:1px solid #dadce0;border-radius:8px;outline:none;text-align:center;margin-bottom:16px}
.login-box button{background:#1a73e8;color:#fff;border:none;padding:12px 32px;font-size:15px;border-radius:8px;cursor:pointer}
@media(max-width:700px){.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="login" class="login-box">
<h2 style="font-weight:500;margin-bottom:8px">Dashboard Access</h2>
<p style="color:#5f6368;font-size:14px;margin-bottom:20px">Enter access key</p>
<input type="password" id="pw" placeholder="Access key" autofocus>
<button onclick="login()">View Dashboard</button>
<p id="err" style="color:#d93025;font-size:13px;margin-top:8px;display:none">Incorrect key</p>
</div>
<div id="dash" style="display:none">
<h1>FGD Skin Survey — Dashboard</h1>
<p class="sub">Total submissions: <strong id="total">-</strong> | Auto-refreshes every 30s</p>
<div class="grid" id="grid"></div>
</div>
<div id="loading" class="loading" style="display:none">Loading...</div>
<div id="error" class="error" style="display:none"></div>

<script>
var API = "https://script.google.com/macros/s/AKfycbz6do5kttmHqajSL-Iancl2k0m-k8t3Uila1dBXYk6WnyoZZ54aG5gDdZgEgniv05nL/exec";
var KEY = "bs2026";

function login(){
  if(document.getElementById("pw").value===KEY){
    document.getElementById("login").style.display="none";
    document.getElementById("loading").style.display="block";
    loadData();
    setInterval(loadData,30000);
  } else {
    document.getElementById("err").style.display="block";
  }
}
document.getElementById("pw").addEventListener("keydown",function(e){if(e.key==="Enter")login()});

function loadData(){
  fetch(API).then(function(r){return r.json()}).then(function(d){
    document.getElementById("loading").style.display="none";
    document.getElementById("dash").style.display="block";
    document.getElementById("total").textContent=d.total;
    if(d.total===0){document.getElementById("grid").innerHTML='<div class="card full"><h2>No submissions yet</h2><p style="padding:20px;color:#5f6368">Waiting for responses...</p></div>';return}
    
    var html="";
    
    // Rankings
    html+='<div class="card full"><h2>Skin Rankings</h2><table><tr><th>#</th><th>Theme</th><th>Avg Rating</th><th>Responses</th></tr>';
    d.rankings.forEach(function(r,i){html+='<tr><td>'+(i+1)+'</td><td>'+r.theme+'</td><td><b>'+r.avg+'</b></td><td>'+r.count+'</td></tr>'});
    html+='</table></div>';
    
    // Ratings detail
    html+='<div class="card full"><h2>Detailed Ratings</h2><table><tr><th>Theme</th><th>Avg</th><th>Distribution</th><th>N</th></tr>';
    d.rankings.forEach(function(r){
      var stars=""; for(var s=0;s<5;s++) stars+=s<Math.round(r.avg)?"&#9733;":"&#9734;";
      html+='<tr><td>'+r.theme+'</td><td><b>'+r.avg+'</b></td><td class="stars">'+stars+'</td><td>'+r.count+'</td></tr>';
    });
    html+='</table></div>';
    
    // Countries
    html+='<div class="card"><h2>Country / Region</h2><table><tr><th>Country</th><th>Count</th><th>%</th></tr>';
    var ckeys=Object.keys(d.countries).sort(function(a,b){return d.countries[b]-d.countries[a]});
    ckeys.forEach(function(c){html+='<tr><td>'+c+'</td><td>'+d.countries[c]+'</td><td>'+(d.countries[c]/d.total*100).toFixed(1)+'%</td></tr>'});
    html+='</table></div>';
    
    // Playtime
    html+='<div class="card"><h2>Playtime</h2><table><tr><th>Duration</th><th>Count</th><th>%</th></tr>';
    ["<1 month","1-3 months","4-12 months","1 year +"].forEach(function(k){var v=d.playtimes[k]||0;html+='<tr><td>'+k+'</td><td>'+v+'</td><td>'+(v/d.total*100).toFixed(1)+'%</td></tr>'});
    html+='</table></div>';
    
    // Spending
    html+='<div class="card"><h2>Spending</h2><table><tr><th>Amount</th><th>Count</th><th>%</th></tr>';
    ["$0","<$5","$6-20","$21-50",">$50"].forEach(function(k){var v=d.spendings[k]||0;html+='<tr><td>'+k+'</td><td>'+v+'</td><td>'+(v/d.total*100).toFixed(1)+'%</td></tr>'});
    html+='</table></div>';
    
    document.getElementById("grid").innerHTML=html;
  }).catch(function(e){
    document.getElementById("loading").style.display="none";
    document.getElementById("error").style.display="block";
    document.getElementById("error").textContent="Failed to load data. Please try again.";
  });
}
</script>
</body>
</html>
